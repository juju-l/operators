apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hlms.helm.example.com
spec:
  group: helm.example.com
  names:
    kind: Helm
    listKind: HelmList
    plural: hlm
    singular: helm
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                releaseName:
                  type: string
                namespace:
                  type: string
                chart:
                  type: string
                version:
                  type: string
                values:
                  type: string
              required:
                - releaseName
                - namespace
                - chart
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string