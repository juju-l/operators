apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hlm.tpl.vipex.cc
spec:
  group: tpl.vipex.cc
  names:
    kind: Hlm
    listKind: HlmList
    plural: hlm
    singular: hlm
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - releaseName
                - namespace
              properties:
                releaseName:
                  type: string
                namespace:
                  type: string
                valuesYAML:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                releaseRef:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type: string
                      status: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason: string
                      message: string