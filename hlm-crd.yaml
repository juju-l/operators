apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hlms.example.com
spec:
  group: example.com
  names:
    kind: Hlm
    listKind: HlmList
    plural: hlms
    singular: hlm
    shortNames:
      - hlm
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          # 允许未知字段，你在 CR 里随便加字段都不会被校验拒绝
          x-kubernetes-preserve-unknown-fields: true
          properties:
            spec:
              type: object
              # 这里你后面可以慢慢加字段，现在先全开
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        # 启用 status 子资源（你的 controller 更新 status 必须要）
        status: {}