apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tsts.example.com
spec:
  group: example.com
  names:
    kind: Tst
    listKind: TstList
    plural: tsts
    singular: tst
  scope: Namespaced # 严格按要求使用 Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                replicas: { type: integer }
                image: { type: string }
            status:
              type: object
              properties:
                readyReplicas: { type: integer }
                state: { type: string }
                message: { type: string }
      subresources:
        status: {} # 启用 status subresource（1.35 标准）