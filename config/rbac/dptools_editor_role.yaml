# This rule is not used by the project helms itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the tpl.vipex.cc.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: helms
    app.kubernetes.io/managed-by: kustomize
  name: dptools-editor-role
rules:
- apiGroups:
  - tpl.vipex.cc
  resources:
  - dptools
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - tpl.vipex.cc
  resources:
  - dptools/status
  verbs:
  - get
