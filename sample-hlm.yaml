apiVersion: tpl.vipex.cc/v1alpha1
kind: Hlm
metadata:
  name: app07-hlm
  namespace: default
spec:
  # 指定要安装的 chart（可以是本地包名或仓库中的 chart 名称）
  chart: tpl_vipex_cc-0.1.0.tgz
  # helm release 名称
  releaseName: app07-release
  # 目标安装命名空间
  targetNamespace: app07-ns

  # 从 _.valuecustomtpls.yml 中提取的示例字段
  env: devcn
  stsSingle: false
  app: app07
  cloudns: "*.helmv3tpl.tstns.cloudns.local"
  coredns: "*.svc.cluster.local"

  # helmv3tpl 保留为通用 map，用于把复杂的 values 树传递给 operator
  helmv3tpl:
    devcn:
      app07:
        _role: {}
        cm+:
          - files: "0/*"
        deploy+:
          - apiVersion: apps/v1
            kinds: StatefulSet
            replicas: 3
            image: busybox

  # global 区域示例
  global:
    reg: ""
    label:
      version: v7
    tag: ""

  # 也可以在 values 中直接传入会被传递给 helm template/install
  values:
    replicaCount: 3
    image:
      repository: busybox
      tag: latest
