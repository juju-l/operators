apiVersion: v1
kind: ServiceAccount
metadata:
  name: tst-operator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tst-operator
  namespace: default
rules:
  - apiGroups: ["example.com"]
    resources: ["tsts"]
    verbs: ["get","list","watch","create","update","patch","delete"]
  - apiGroups: ["example.com"]
    resources: ["tsts/status"]
    verbs: ["get","update","patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get","list","watch","create","update","patch","delete"]
  - apiGroups: ["" ]
    resources: ["pods","services","configmaps","events"]
    verbs: ["get","list","watch","create","update","patch","delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tst-operator
  namespace: default
subjects:
  - kind: ServiceAccount
    name: tst-operator
    namespace: default
roleRef:
  kind: Role
  name: tst-operator
  apiGroup: rbac.authorization.k8s.io
